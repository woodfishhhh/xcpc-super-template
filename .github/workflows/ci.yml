name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate public templates
        run: npm run validate:templates

      - name: Run unit tests
        run: npm test

      - name: Run release candidate preflight
        run: npm run release:preflight

      - name: Build app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run PDF QA
        run: npm run qa:pdf

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Audit high severity vulnerabilities
        run: npm audit --audit-level=high
