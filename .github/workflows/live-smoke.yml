name: Live Smoke

on:
  workflow_dispatch:
    inputs:
      url:
        description: Live app URL to verify
        required: false
        default: https://woodfishhhh.github.io/xcpc-super-template/

jobs:
  verify-live-pwa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify live PWA and offline reopen
        run: npm run verify:live -- --url "${{ inputs.url }}"
